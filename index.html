<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TutorIA – WhatsApp Widget Demo</title>
  <style>
    /* ── Demo page background ── */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .demo-card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .demo-card h1 { margin: 0 0 12px; font-size: 28px; color: #C8102E; }
    .demo-card p  { color: #666; line-height: 1.6; }

    /* ════════════════════════════════════════
       WHATSAPP WIDGET  –  copy everything below
       into your own page
    ════════════════════════════════════════ */

    /* Floating button */
    #wa-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 60px;
      height: 60px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(37,211,102,.45);
      transition: transform .2s, box-shadow .2s;
      z-index: 9998;
    }
    #wa-bubble:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 22px rgba(37,211,102,.55);
    }
    #wa-bubble svg { width: 32px; height: 32px; fill: white; }

    /* Notification badge */
    #wa-badge {
      position: fixed;
      bottom: 74px;
      right: 24px;
      background: #C8102E;
      color: white;
      font-size: 11px;
      font-weight: 700;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.15); }
    }

    /* Popup panel */
    #wa-popup {
      position: fixed;
      bottom: 104px;
      right: 28px;
      width: 320px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 9997;
      animation: slideUp .25s ease;
    }
    #wa-popup.open { display: flex; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Popup header */
    .wa-header {
      background: #075E54;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .wa-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #C8102E;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .wa-avatar svg { width: 28px; height: 28px; }
    .wa-info { flex: 1; }
    .wa-info .wa-name  { color: white; font-weight: 700; font-size: 15px; }
    .wa-info .wa-status {
      color: rgba(255,255,255,.75);
      font-size: 12px;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .wa-info .wa-status::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #4ADE80;
      border-radius: 50%;
      display: inline-block;
    }
    .wa-close {
      color: rgba(255,255,255,.8);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 4px;
      border-radius: 50%;
      transition: background .15s;
    }
    .wa-close:hover { background: rgba(255,255,255,.15); }

    /* Chat bubble inside popup */
    .wa-body {
      padding: 18px 16px 12px;
      background: #ECE5DD;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4ccc5' fill-opacity='0.5'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .wa-message {
      background: white;
      border-radius: 0 10px 10px 10px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      color: #111;
      box-shadow: 0 1px 2px rgba(0,0,0,.1);
      max-width: 85%;
      position: relative;
    }
    .wa-message::before {
      content: '';
      position: absolute;
      top: 0; left: -8px;
      border: 8px solid transparent;
      border-top-color: white;
      border-right-color: white;
    }
    .wa-time {
      text-align: right;
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    /* CTA button */
    .wa-footer {
      padding: 14px 16px;
      background: white;
    }
    .wa-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      background: #25D366;
      color: white;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, transform .1s;
    }
    .wa-cta:hover  { background: #1ebe5a; transform: translateY(-1px); }
    .wa-cta:active { transform: translateY(0); }
    .wa-cta svg    { width: 18px; height: 18px; fill: white; flex-shrink: 0; }

    /* ── end of widget styles ── */
  </style>
</head>
<body>

<!-- Demo page content -->
<div class="demo-card">
  <h1>TutorIA Perú</h1>
  <p>Esta es una demo del widget de WhatsApp.<br>
     Haz clic en el botón verde en la esquina inferior derecha.</p>
</div>

<!-- ═══════════════════════════════════════
     WHATSAPP WIDGET  –  HTML
     Pega este bloque en tu página
═══════════════════════════════════════ -->

<!-- Badge de notificación -->
<div id="wa-badge">1</div>

<!-- Botón flotante -->

  </svg>
</div>

<!-- Popup panel -->
<div id="wa-popup">
  <!-- Header -->
  <div class="wa-header">
    <div class="wa-avatar">
      <!-- Graduation cap icon (TutorIA brand) -->
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
        <polygon points="50,18 72,30 65,38 50,44 35,38 28,30" stroke="white" stroke-width="5.5" stroke-linejoin="round"/>
        <path d="M35,36 L35,54 Q35,66 50,66 Q65,66 65,54 L65,36" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="72" y1="30" x2="72" y2="56" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
        <circle cx="72" cy="61" r="4.5" fill="white"/>
      </svg>
    </div>
    <div class="wa-info">
      <div class="wa-name">TutorIA Perú</div>
      <div class="wa-status">En línea</div>
    </div>
    <div class="wa-close" onclick="closeWAPopup()" title="Cerrar">✕</div>
  </div>

  <!-- Chat bubble -->
  <div class="wa-body">
    <div class="wa-message">
      ¡Hola! 👋 Soy el asistente de <strong>TutorIA</strong>.<br>
      ¿En qué te puedo ayudar hoy?
      <div class="wa-time">ahora</div>
    </div>
  </div>

  <!-- CTA -->
  <div class="wa-footer">
    <a class="wa-cta"
       href="https://wa.me/12134444005?text=Hola%2C%20necesito%20ayuda%20con%20TutorIA"
       target="_blank" rel="noopener">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 1C7.716 1 1 7.716 1 16c0 2.628.672 5.1 1.848 7.26L1 31l7.98-2.088A14.93 14.93 0 0016 31c8.284 0 15-6.716 15-15S24.284 1 16 1zm0 27.4a12.3 12.3 0 01-6.272-1.716l-.448-.268-4.648 1.22 1.24-4.524-.292-.464A12.36 12.36 0 013.6 16C3.6 9.152 9.152 3.6 16 3.6S28.4 9.152 28.4 16 22.848 28.4 16 28.4zm6.748-9.24c-.368-.184-2.18-1.076-2.52-1.196-.336-.12-.58-.184-.824.184-.244.368-.948 1.196-1.164 1.44-.212.244-.428.272-.796.088-.368-.184-1.556-.572-2.964-1.828-1.096-.976-1.836-2.18-2.052-2.548-.212-.368-.024-.568.16-.752.164-.16.368-.42.552-.628.184-.208.244-.368.368-.612.12-.244.06-.456-.032-.64-.088-.184-.824-1.988-1.128-2.72-.296-.716-.6-.62-.824-.632h-.704c-.244 0-.64.092-.976.456-.336.368-1.28 1.252-1.28 3.056s1.312 3.544 1.496 3.788c.184.244 2.58 3.936 6.252 5.52.872.376 1.552.6 2.084.768.876.28 1.672.24 2.3.148.7-.104 2.18-.892 2.488-1.752.308-.86.308-1.596.216-1.752-.088-.156-.328-.244-.7-.428z"/>
      </svg>
      Chatear en WhatsApp
    </a>
  </div>
</div>

<!-- ═══════════════════════════════════════
     WHATSAPP WIDGET  –  JavaScript
═══════════════════════════════════════ -->
<script>
  function toggleWAPopup() {
    const popup = document.getElementById('wa-popup');
    const badge = document.getElementById('wa-badge');
    popup.classList.toggle('open');
    if (popup.classList.contains('open')) {
      badge.style.display = 'none'; // hide badge on first open
    }
  }
  function closeWAPopup() {
    document.getElementById('wa-popup').classList.remove('open');
  }
  // Auto-open after 4s (optional – remove if you don't want it)
  setTimeout(() => {
    document.getElementById('wa-popup').classList.add('open');
    document.getElementById('wa-badge').style.display = 'none';
  }, 4000);
</script>

</body>
</html>
